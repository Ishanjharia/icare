# I-CARE local demo stack (API + InfluxDB + MQTT + React)
# From repo root: docker compose up --build
#
# Browser: http://localhost:3000  (frontend → API at http://localhost:8000 on host)
# API docs: http://localhost:8000/docs

services:
  influxdb:
    image: influxdb:2.7-alpine
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: icare
      DOCKER_INFLUXDB_INIT_PASSWORD: icare_dev_change_me
      DOCKER_INFLUXDB_INIT_ORG: icare
      DOCKER_INFLUXDB_INIT_BUCKET: vitals
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: icare-dev-influx-token-change-me

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data

  backend:
    build:
      context: ./icare/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/icare.db
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: icare-dev-influx-token-change-me
      INFLUXDB_ORG: icare
      INFLUXDB_BUCKET: vitals
      SECRET_KEY: docker-demo-secret-change-me
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      SMS_LOG_ONLY: "1"
      WHISPER_DEVICE: cpu
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - influxdb
      - mosquitto

  frontend:
    build:
      context: ./icare/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  sqlite_data:
  influxdb_data:
  mosquitto_data:
